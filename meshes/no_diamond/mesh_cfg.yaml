boundary_conditions:
  outer:
    bottom:
      type: dirichlet
      value: 300.0
    left:
      type: dirichlet
      value: 300.0
    right:
      type: dirichlet
      value: 300.0
    top:
      type: dirichlet
      value: 300.0
heating:
  bc:
    center: 0.0
    length: null
    location: inner
    type: gaussian
  file: experimental_data/geballe_heat_data.csv
  fwhm: 1.32e-05
  ic_temp: 300.0
io:
  mesh_path: meshes/no_diamond
layout:
  custom_positions: null
  materials:
  - p_ins
  - p_coupler
  - p_sample
  - o_coupler
  - o_ins
  type: stacked
material_tags:
  o_coupler: 4
  o_ins: 5
  p_coupler: 2
  p_ins: 1
  p_sample: 3
mats:
  o_coupler:
    cv: 130
    k: 352
    mesh: 4.0e-08
    r: 20e-6
    rho: 26504
    z: 6.2e-08
  o_ins:
    cv: 668
    k: 10
    mesh: 5.0e-08
    r: 20e-6
    rho: 4131
    z: 6.3e-06
  p_coupler:
    cv: 130
    k: 352
    mesh: 2.0e-08
    r: 20e-6
    rho: 26504
    z: 6.2e-08
  p_ins:
    cv: 668
    k: 10
    mesh: 5.0e-08
    r: 20e-6
    rho: 4131
    z: 3.2e-06
  p_sample:
    cv: 1158
    k: 3.8
    mesh: 4.0e-08
    r: 20e-6
    rho: 5164
    z: 1.84e-06
output:
  analysis:
    calculate_rmse: true
    enabled: true
    experimental_data_file: experimental_data/geballe_heat_data.csv
    plot_temperature_curves: true
  watcher_points:
    enabled: true
    filename: watcher_points.csv
    points:
      oside_coupler:
        material: o_coupler
        position: center
      pside_coupler:
        material: p_coupler
        position: center
  xdmf:
    enabled: false
    filename: output.xdmf
    write_frequency: 1
performance:
  memory_optimization:
    clear_intermediates: true
    enabled: true
  mesh:
    cache_enabled: true
    rebuild_threshold: 0.1
  progress_reporting:
    enabled: true
    interval: 5
solver:
  direct:
    factorization: mumps
    method: lu
  iterative:
    max_iterations: 1000
    method: gmres
    preconditioner: ilu
    tolerance: 1e-8
  type: direct
timing:
  num_steps: 50
  t_final: 7.5e-06
