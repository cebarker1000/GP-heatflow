boundary_conditions:
  outer:
    left:
      type: dirichlet
      value: ic_temp
    right:
      type: dirichlet
      value: ic_temp
    top:
      type: dirichlet
      value: ic_temp
heating:
  bc:
    center: 1.0
    location: inner
    material: p_ins
    type: gaussian
  file: experimental_data/geballe_heat_data.csv
  fwhm: 1.32e-05
  ic_temp: 300.0
io:
  mesh_path: meshes/no_diamond_no_ir
layout:
  materials:
  - p_ins
  - sample
  - o_ins
material_tags:
  o_ins: 3
  p_ins: 1
  sample: 2
mats:
  o_ins:
    cv: 668
    k: 10
    mesh: 5.0e-08
    r: 20e-6
    rho: 4131
    z: 6.3e-06
  p_ins:
    cv: 668
    k: 10
    mesh: 5.0e-08
    r: 20e-6
    rho: 4131
    z: 3.2e-06
  sample:
    cv: 1158
    k: 3.8
    mesh: 4.0e-08
    r: 20e-6
    rho: 5164
    z: 1.84e-06
output:
  analysis:
    calculate_rmse: true
    enabled: true
    experimental_data_file: experimental_data/geballe_heat_data.csv
    plot_temperature_curves: true
  watcher_points:
    enabled: true
    filename: watcher_points.csv
    points:
      oside:
        material: o_ins
        position:
          percentage: 0.0
          r: 0.0
      pside:
        material: p_ins
        position:
          percentage: 1.0
          r: 0.0
  xdmf:
    enabled: true
    filename: output.xdmf
performance:
  progress_reporting:
    enabled: true
    interval: 10
  visualize_mesh: true
solver:
  direct:
    factorization: mumps
  type: direct
timing:
  num_steps: 50
  t_final: 7.5e-06
